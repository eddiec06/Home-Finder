services:
  # ------------------------------------------------------------
  # Backend - FastAPI (native Python on Render).
  # Render's Python buildpack picks up the root `requirements.txt`
  # (which `-r`-includes backend/requirements.txt) and `runtime.txt`
  # automatically, so no explicit buildCommand is needed.
  # ------------------------------------------------------------
  - type: web
    name: home-finder-backend
    runtime: python
    startCommand: cd backend && python server.py
    envVars:
      - key: MONGO_URL
        sync: false           # paste your MongoDB Atlas connection string here
      - key: DB_NAME
        value: homefinder_db
      - key: JWT_SECRET
        generateValue: true   # Render generates a strong random secret
      - key: ADMIN_EMAIL
        value: admin@homefinder.local
      - key: ADMIN_PASSWORD
        sync: false           # set in Render dashboard
      - key: SIMULATE_MFA
        value: "true"
      - key: CORS_ORIGINS
        sync: false           # set to the deployed frontend URL after first deploy

  # ------------------------------------------------------------
  # Frontend - React (CRA), built and served as a static site.
  # ------------------------------------------------------------
  - type: web
    name: home-finder-frontend
    runtime: static
    buildCommand: cd frontend && yarn install --frozen-lockfile && yarn build
    staticPublishPath: ./frontend/build
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false           # set to the backend service URL after first deploy
    routes:
      # SPA routing — every unknown path falls back to index.html
      - type: rewrite
        source: /*
        destination: /index.html
