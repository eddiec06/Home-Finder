services:
  # ------------------------------------------------------------
  # Backend - FastAPI (served by uvicorn from server.py)
  # Render will use the root Dockerfile when Docker mode is active,
  # OR the native-Python buildCommand below in Blueprint mode.
  # ------------------------------------------------------------
  - type: web
    name: home-finder-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    dockerfilePath: ./Dockerfile          # root Dockerfile if Docker mode is used
    dockerContext: .
    envVars:
      - key: MONGO_URL
        sync: false           # paste your MongoDB Atlas connection string here
      - key: DB_NAME
        value: homefinder_db
      - key: JWT_SECRET
        generateValue: true   # Render generates a strong random secret
      - key: ADMIN_EMAIL
        value: admin@homefinder.local
      - key: ADMIN_PASSWORD
        sync: false           # set in Render dashboard
      - key: SIMULATE_MFA
        value: "true"
      - key: CORS_ORIGINS
        sync: false           # set to the deployed frontend URL after first deploy

  # ------------------------------------------------------------
  # Frontend - React (CRA), built and served as a static site
  # ------------------------------------------------------------
  - type: web
    name: home-finder-frontend
    runtime: static
    rootDir: frontend
    buildCommand: yarn install --frozen-lockfile && yarn build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false           # set to the backend service URL after first deploy
    routes:
      # SPA routing — every unknown path falls back to index.html
      - type: rewrite
        source: /*
        destination: /index.html
