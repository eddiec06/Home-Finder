services:
  # ------------------------------------------------------------
  # Backend - FastAPI (native Python on Render).
  # ------------------------------------------------------------
  - type: web
    name: home-finder-backend
    runtime: python
    startCommand: python backend/server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9         # Render uses this env var to pin Python
      - key: PYTHONUNBUFFERED
        value: "1"            # so any error is flushed to logs before exit
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: homefinder_db
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@homefinder.local
      - key: ADMIN_PASSWORD
        sync: false
      - key: SIMULATE_MFA
        value: "true"
      - key: CORS_ORIGINS
        sync: false

  # ------------------------------------------------------------
  # Frontend - React (CRA), built and served as a static site.
  # ------------------------------------------------------------
  - type: web
    name: home-finder-frontend
    runtime: static
    buildCommand: cd frontend && yarn install --frozen-lockfile && yarn build
    staticPublishPath: ./frontend/build
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
